services:

  frontend:
    build: ./client
    ports:
      - "5173:5173"

    volumes:
      - ./client:/app
      - /app/node_modules

    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

    depends_on:
      - backend

    stdin_open: true
    tty: true
    restart: unless-stopped


  backend:
    build: ./server

    ports:
      - "5001:5001"

    volumes:
      - ./server:/app
      - /app/node_modules

    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

    depends_on:
      - mongo

    restart: unless-stopped


  mongo:
    image: mongo
    container_name: mongodb

    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db


volumes:
  mongo-data: 
